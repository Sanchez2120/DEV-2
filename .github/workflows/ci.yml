name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend – Build, Format & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore
        working-directory: backend

      - name: Check code style (dotnet format)
        run: dotnet format --verify-no-changes --no-restore
        working-directory: backend

      - name: Build
        run: dotnet build --no-restore -c Release
        working-directory: backend

      - name: Run tests
        run: dotnet test --no-build -c Release --logger "console;verbosity=minimal"
        working-directory: backend

      - name: Build Docker image
        run: docker build -t asisya-backend:${{ github.sha }} ./backend

  frontend:
    name: Frontend – Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint (ESLint)
        run: npm run lint
        working-directory: frontend

      - name: Build (TypeScript check + Vite)
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:5000/api

      - name: Build Docker image
        run: docker build -t asisya-frontend:${{ github.sha }} ./frontend
