services:
  db:
    image: postgres:16-alpine
    container_name: asisya_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: asisya
      POSTGRES_USER: asisya_user
      POSTGRES_PASSWORD: asisya_password
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U asisya_user -d asisya" ]
      interval: 10s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: asisya_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=asisya;Username=asisya_user;Password=asisya_password
      - Jwt__Issuer=Asisya
      - Jwt__Audience=AsisyaClient
      - Jwt__SecretKey=${JWT_SECRET_KEY:-SuperSecretKeyForAsiysaDevTest2024!!}
    ports:
      - "5000:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: asisya_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pg_data:
